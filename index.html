<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Geometry Dash Wave – Spikes</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background-color: #000;
      color: #fff;
      overflow: hidden;
    }
    #game-container {
      position: relative;
      width: 900px;
      height: 500px;
      margin: 20px auto;
      border: 1px solid #444;
      background: radial-gradient(circle at center, #033b7a 0, #020615 60%);
    }
    canvas { display: block; }
    #menu, #pause-overlay, #death-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #menu {
      background-color: rgba(5, 10, 30, 0.96);
      justify-content: flex-start;
      padding-top: 80px;
    }
    #menu h1 {
      font-size: 40px;
      color: #ffcc00;
      margin-bottom: 10px;
    }
    #menu p {
      font-size: 20px;
      margin-bottom: 20px;
      color: #ccc;
    }
    .level-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px 10px;
    }
    #endless-mode-btn,
    .level-button {
      height: 50px;
      border-radius: 8px;
      border: 2px solid #fff;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
    }
    #endless-mode-btn {
      width: 200px;
      background-color: #00cc00;
      margin-bottom: 20px;
    }
    .level-button {
      width: 150px;
      background-color: #0077cc;
    }
    .level-button.locked {
      background-color: #666;
      cursor: not-allowed;
    }
    .level-button.beaten {
      border-color: #00ff99;
    }
    .best-score {
      font-size: 14px;
      color: #00ff99;
      margin-top: 2px;
    }
    #pause-overlay,
    #death-overlay {
      background-color: rgba(0, 0, 0, 0.85);
      font-size: 20px;
      display: none;
    }
    #pause-overlay button,
    #death-overlay button {
      margin: 10px 0;
      padding: 10px 20px;
      border-radius: 6px;
      border: none;
      background-color: #0077cc;
      color: #fff;
      cursor: pointer;
    }
    #death-overlay button.green {
      background-color: #00cc00;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas" width="900" height="500"></canvas>


    <div id="menu">
      <h1>Geometry Dash Wave</h1>
      <p>Select Level (1–10) or Endless Mode</p>
      <button id="endless-mode-btn">Endless Mode</button>
      <div class="level-buttons" id="level-buttons"></div>
    </div>


    <div id="pause-overlay">
      <h2>Paused</h2>
      <button id="resume-btn">Resume</button>
      <button id="menu-btn">Main Menu</button>
    </div>


    <div id="death-overlay">
      <h2>You Died!</h2>
      <button id="restart-btn">Restart</button>
      <button id="menu-btn-d" class="green">Main Menu</button>
    </div>
  </div>


  <script>
    const canvas = document.getElementById("game-canvas");
    const ctx = canvas.getContext("2d");


    const menuEl = document.getElementById("menu");
    const pauseOverlay = document.getElementById("pause-overlay");
    const deathOverlay = document.getElementById("death-overlay");
    const resumeBtn = document.getElementById("resume-btn");
    const menuBtn = document.getElementById("menu-btn");
    const restartBtn = document.getElementById("restart-btn");
    const menuBtnD = document.getElementById("menu-btn-d");
    const levelButtonsEl = document.getElementById("level-buttons");
    const endlessModeBtn = document.getElementById("endless-mode-btn");


    const NUM_LEVELS = 10;
    let levelsBeaten = Array(NUM_LEVELS).fill(false);
    let bestProgress = Array(NUM_LEVELS).fill(0);
    let endlessBestScore = 0;


    let gameState = "menu"; // menu, playing, endless, paused, dead
    let currentLevelIndex = 0;
    let isEndlessMode = false;


    // Wave settings (Y roughly 2x, forward speed handled in scrollSpeed)
    const WAVE_SIZE = 20;
    const WAVE_RISE_FALL = 8.4;
    const SPEED_MULTIPLIER = 1.7;


    // Load wave icon with transparent background (PNG)
    const waveImg = new Image();
    waveImg.src =
      "https://www.vhv.rs/dpng/d/479-4799969_1-geometry-dash-wave-png-download-geometry-dash.png";


    let waveRotation = 0;
    let targetRotation = 0;
    const ROTATION_SPEED = 0.15;


    class Obstacle {
      constructor(x, y, w, h, type = "spikeTop") {
        this.x = x;
        this.y = y;
        this.w = w;
        this.h = h;
        this.type = type; // spikeTop, spikeBottom, normal
      }


      update(speed) {
        const effectiveSpeed = speed * SPEED_MULTIPLIER;
        this.x -= effectiveSpeed;
      }


      drawSpikes(isTop) {
        const spikeSize = 18;
        const spikes = Math.max(2, Math.floor(this.w / spikeSize));


        // dark inner block
        ctx.fillStyle = "#050812";
        ctx.fillRect(this.x, this.y, this.w, this.h);


        // neon spike edge
        ctx.fillStyle = "#00bfff";
        ctx.strokeStyle = "#00ffff";
        ctx.lineWidth = 2;


        ctx.beginPath();
        if (isTop) {
          ctx.moveTo(this.x, this.y + this.h);
          let px = this.x;
          for (let i = 0; i < spikes; i++) {
            const mid = px + spikeSize / 2;
            const next = px + spikeSize;
            ctx.lineTo(mid, this.y + this.h - spikeSize);
            ctx.lineTo(next, this.y + this.h);
            px = next;
          }
        } else {
          ctx.moveTo(this.x, this.y);
          let px = this.x;
          for (let i = 0; i < spikes; i++) {
            const mid = px + spikeSize / 2;
            const next = px + spikeSize;
            ctx.lineTo(mid, this.y + spikeSize);
            ctx.lineTo(next, this.y);
            px = next;
          }
        }
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
      }


      draw() {
        if (this.type === "spikeTop") {
          this.drawSpikes(true);
        } else if (this.type === "spikeBottom") {
          this.drawSpikes(false);
        } else {
          ctx.fillStyle = "#cc1111";
          ctx.fillRect(this.x, this.y, this.w, this.h);
        }
      }


      collidesWith(waveRect) {
        return (
          waveRect.x < this.x + this.w &&
          waveRect.x + waveRect.w > this.x &&
          waveRect.y < this.y + this.h &&
          waveRect.y + waveRect.h > this.y
        );
      }
    }


    // scores in localStorage
    function loadBestScores() {
      const saved = localStorage.getItem("geometry_dash_wave_best");
      if (!saved) return;
      try {
        const data = JSON.parse(saved);
        if (data.levels && data.progress && data.endlessBest != null) {
          levelsBeaten = data.levels;
          bestProgress = data.progress;
          endlessBestScore = data.endlessBest;
        }
      } catch {}
    }
    function saveBestScores() {
      const data = {
        levels: levelsBeaten.slice(),
        progress: bestProgress.slice(),
        endlessBest: endlessBestScore,
      };
      localStorage.setItem("geometry_dash_wave_best", JSON.stringify(data));
    }
    loadBestScores();


    function generateLevelData(levelIndex) {
      const baseSpeed = (3 + levelIndex * 0.4);
      const obstacles = [];


      const levelLength = (5000 + levelIndex * 800) * SPEED_MULTIPLIER;
      const minGap = Math.max(80 - levelIndex * 5, 40);
      const maxGap = Math.max(160 - levelIndex * 6, minGap + 5);


      let x = 900 + 200;


      while (x < levelLength) {
        const gapYCenter = 90 + Math.random() * (canvas.height - 180);
        const segmentWidth = 50 + Math.random() * 40;


        const topHeight = gapYCenter - minGap / 2;
        const bottomY = gapYCenter + minGap / 2;
        const bottomHeight = canvas.height - bottomY;


        if (topHeight > 0) {
          obstacles.push(
            new Obstacle(x, 0, segmentWidth, topHeight, "spikeTop")
          );
        }
        if (bottomHeight > 0) {
          obstacles.push(
            new Obstacle(x, bottomY, segmentWidth, bottomHeight, "spikeBottom")
          );
        }


        x += 180 + Math.random() * (maxGap - 180);
      }


      return { scrollSpeed: baseSpeed, obstacles, length: levelLength };
    }


    // endless mode
    let endlessObstacles = [];
    let endlessScrollSpeed = 3;
    let endlessProgress = 0;
    let lastObstacleX = 0;


    function generateEndlessChunk() {
      const segmentWidth = 50 + Math.random() * 40;
      const gapYCenter = 90 + Math.random() * (canvas.height - 180);
      const minGap = 60;


      const topHeight = gapYCenter - minGap / 2;
      const bottomY = gapYCenter + minGap / 2;
      const bottomHeight = canvas.height - bottomY;


      if (topHeight > 0) {
        endlessObstacles.push(
          new Obstacle(lastObstacleX, 0, segmentWidth, topHeight, "spikeTop")
        );
      }
      if (bottomHeight > 0) {
        endlessObstacles.push(
          new Obstacle(
            lastObstacleX,
            bottomY,
            segmentWidth,
            bottomHeight,
            "spikeBottom"
          )
        );
      }


      lastObstacleX += (180 + Math.random() * 120) * SPEED_MULTIPLIER;
    }


    function setupEndlessMode() {
      endlessObstacles = [];
      endlessScrollSpeed = 3;
      endlessProgress = 0;
      lastObstacleX = 900 + 200;
      for (let i = 0; i < 10; i++) generateEndlessChunk();
      isEndlessMode = true;
      isAlive = true;
      gameState = "endless";
      menuEl.style.display = "none";
      deathOverlay.style.display = "none";
      pauseOverlay.style.display = "none";
      waveRotation = 0;
      targetRotation = 0;
    }


    // wave state
    let waveX = 120;
    let waveY = canvas.height / 2;
    let progressX = 0;
    let levelData = null;
    let isAlive = true;
    let isPaused = false;


    let isMousePressed = false;
    let isSpacePressed = false;


    // simple crash sound
    let audioCtx;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch {}


    function playCrashSound() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.setValueAtTime(160, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(
        60,
        audioCtx.currentTime + 0.25
      );
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(
        0.01,
        audioCtx.currentTime + 0.25
      );
      osc.start();
      osc.stop(audioCtx.currentTime + 0.25);
    }


    function drawTextCenter(text, font, color, x, y) {
      ctx.font = font;
      const m = ctx.measureText(text);
      ctx.fillStyle = color;
      ctx.fillText(text, x - m.width / 2, y);
    }


    function drawWaveIcon() {
      const size = WAVE_SIZE * 1.6;
      ctx.save();
      ctx.translate(waveX, waveY);
      ctx.rotate(waveRotation);


      if (waveImg.complete && waveImg.naturalHeight !== 0) {
        ctx.drawImage(waveImg, -size / 2, -size / 2, size, size);
      } else {
        ctx.fillStyle = "#ffcc00";
        ctx.beginPath();
        ctx.moveTo(0, -size / 2);
        ctx.lineTo(-size / 3, size / 3);
        ctx.lineTo(size / 3, size / 3);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    }


    function drawLevelScene() {
      // background
      ctx.fillStyle = "#021026";
      ctx.fillRect(0, 0, canvas.width, canvas.height);


      // circular lines for GD vibe
      ctx.strokeStyle = "rgba(0,180,255,0.25)";
      for (let r = 80; r < 600; r += 60) {
        ctx.beginPath();
        ctx.arc(canvas.width / 2, canvas.height / 2, r, 0, Math.PI * 2);
        ctx.stroke();
      }


      // ground/ceiling
      ctx.strokeStyle = "#0ff";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(canvas.width, 0);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, canvas.height - 1);
      ctx.lineTo(canvas.width, canvas.height - 1);
      ctx.stroke();


      // obstacles
      let obstaclesToDraw = [];
      if (isEndlessMode) {
        obstaclesToDraw = endlessObstacles;
      } else if (levelData && levelData.obstacles) {
        obstaclesToDraw = levelData.obstacles;
      }
      obstaclesToDraw.forEach((o) => {
        if (o.x + o.w > -50 && o.x < canvas.width + 50) o.draw();
      });


      // player
      drawWaveIcon();


      if (isEndlessMode) {
        drawTextCenter(
          `Endless – Score: ${Math.floor(endlessProgress)}`,
          "20px Arial",
          "#ffcc00",
          canvas.width / 2,
          24
        );
        drawTextCenter(
          `Best: ${endlessBestScore}`,
          "16px Arial",
          "#00ff99",
          canvas.width / 2,
          46
        );
      } else {
        drawTextCenter(
          `Level ${currentLevelIndex + 1}`,
          "20px Arial",
          "#ffffff",
          80,
          24
        );
        const barW = 260;
        const barH = 10;
        const barX = canvas.width - barW - 40;
        const barY = 24;
        ctx.strokeStyle = "#aaaaaa";
        ctx.strokeRect(barX, barY, barW, barH);
        const ratio = Math.max(
          0,
          Math.min(1, progressX / (levelData ? levelData.length : 1))
        );
        ctx.fillStyle = "#00ff99";
        ctx.fillRect(barX, barY, barW * ratio, barH);
      }
    }


    function updateWave() {
      if (!isAlive) return;


      const hold = isMousePressed || isSpacePressed;
      if (hold) {
        waveY -= WAVE_RISE_FALL;
        targetRotation = -0.5;
      } else {
        waveY += WAVE_RISE_FALL;
        targetRotation = 0.5;
      }


      waveRotation += (targetRotation - waveRotation) * ROTATION_SPEED;
      waveY = Math.max(WAVE_SIZE, Math.min(canvas.height - WAVE_SIZE, waveY));


      const waveRect = {
        x: waveX - WAVE_SIZE / 2,
        y: waveY - WAVE_SIZE / 2,
        w: WAVE_SIZE,
        h: WAVE_SIZE,
      };


      if (!isEndlessMode && levelData) {
        progressX += levelData.scrollSpeed * SPEED_MULTIPLIER;
        levelData.obstacles.forEach((o) => o.update(levelData.scrollSpeed));


        for (const o of levelData.obstacles) {
          if (o.collidesWith(waveRect)) {
            isAlive = false;
            playCrashSound();
            gameState = "dead";
            deathOverlay.style.display = "flex";
            return;
          }
        }


        const newProgress = Math.max(
          0,
          Math.min(1, progressX / levelData.length)
        );
        if (newProgress > bestProgress[currentLevelIndex]) {
          bestProgress[currentLevelIndex] = newProgress;
          saveBestScores();
        }


        if (progressX >= levelData.length) {
          levelsBeaten[currentLevelIndex] = true;
          bestProgress[currentLevelIndex] = 1;
          saveBestScores();
          gameState = "menu";
          setTimeout(() => {
            renderMenu();
            updateButtons();
          }, 200);
        }
      } else if (isEndlessMode) {
        endlessProgress += endlessScrollSpeed * SPEED_MULTIPLIER;
        endlessScrollSpeed = 3 + endlessProgress / 3000;


        while (endlessObstacles.length && endlessObstacles[0].x < -150) {
          endlessObstacles.shift();
        }
        while (lastObstacleX < endlessProgress + 1000) {
          generateEndlessChunk();
        }
        endlessObstacles.forEach((o) => o.update(endlessScrollSpeed));


        for (const o of endlessObstacles) {
          if (o.collidesWith(waveRect)) {
            isAlive = false;
            if (endlessProgress > endlessBestScore) {
              endlessBestScore = Math.floor(endlessProgress);
              saveBestScores();
            }
            playCrashSound();
            gameState = "dead";
            deathOverlay.style.display = "flex";
            return;
          }
        }
      }
    }


    function gameLoop() {
      if ((gameState === "playing" || gameState === "endless") && !isPaused) {
        updateWave();
        drawLevelScene();
      }
      requestAnimationFrame(gameLoop);
    }


    function updateButtons() {
      levelButtonsEl.innerHTML = "";
      for (let i = 0; i < NUM_LEVELS; i++) {
        const btn = document.createElement("button");
        btn.className = "level-button";
        btn.textContent = `Level ${i + 1}`;
        const unlocked = i === 0 || levelsBeaten[i - 1];
        if (!unlocked) btn.classList.add("locked");
        else if (levelsBeaten[i]) btn.classList.add("beaten");


        const progress = Math.floor(bestProgress[i] * 100);
        let wrapper = btn;
        if (progress > 0) {
          const p = document.createElement("div");
          p.className = "best-score";
          p.textContent = `Best: ${progress}%`;
          wrapper = document.createElement("div");
          wrapper.style.display = "flex";
          wrapper.style.flexDirection = "column";
          wrapper.style.alignItems = "center";
          wrapper.appendChild(btn);
          wrapper.appendChild(p);
        }
        levelButtonsEl.appendChild(wrapper);


        btn.addEventListener("click", () => {
          if (!unlocked) return;
          startLevel(i);
        });
      }
    }


    function renderMenu() {
      menuEl.style.display = "flex";
      pauseOverlay.style.display = "none";
      deathOverlay.style.display = "none";
    }


    function startLevel(levelIndex) {
      isEndlessMode = false;
      currentLevelIndex = levelIndex;
      levelData = generateLevelData(levelIndex);
      waveX = 120;
      waveY = canvas.height / 2;
      progressX = 0;
      isAlive = true;
      isPaused = false;
      gameState = "playing";
      menuEl.style.display = "none";
      deathOverlay.style.display = "none";
      pauseOverlay.style.display = "none";
      waveRotation = 0;
      targetRotation = 0;
    }


    // UI events
    endlessModeBtn.addEventListener("click", setupEndlessMode);
    resumeBtn.addEventListener("click", () => {
      isPaused = false;
      pauseOverlay.style.display = "none";
      gameState = isEndlessMode ? "endless" : "playing";
    });
    menuBtn.addEventListener("click", () => {
      gameState = "menu";
      renderMenu();
    });
    menuBtnD.addEventListener("click", () => {
      gameState = "menu";
      renderMenu();
    });
    restartBtn.addEventListener("click", () => {
      deathOverlay.style.display = "none";
      if (isEndlessMode) setupEndlessMode();
      else startLevel(currentLevelIndex);
    });


    // input
    canvas.addEventListener("mousedown", () => { isMousePressed = true; });
    window.addEventListener("mouseup", () => { isMousePressed = false; });


    window.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        isSpacePressed = true;
        e.preventDefault();
      }
      if (e.code === "Escape") {
        if (gameState === "paused") {
          isPaused = false;
          pauseOverlay.style.display = "none";
          gameState = isEndlessMode ? "endless" : "playing";
        } else if (gameState === "playing" || gameState === "endless") {
          isPaused = true;
          pauseOverlay.style.display = "flex";
          gameState = "paused";
        }
      }
    });


    window.addEventListener("keyup", (e) => {
      if (e.code === "Space") {
        isSpacePressed = false;
        e.preventDefault();
      }
    });


    // init
    updateButtons();
    renderMenu();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
